body:
  text: 西來妙諦序盖聞虞廷十六字衍心法治統之傳太上五千言闡道德神仙之旨稽內典悉寓真詮溯三教之同源惟經不易登羣生於覺岸在佛言慈是以淨域靈根辯才無礙梵宮秘笈慧業微聞用能廣濟度之梯堦豈第結因緣於香火哉今涵虗子固玄下弟子也兼修戒定之力發生刊布之心冀警勸乎同門藉宣揚為程課遂取貝葉心傳之所秘藏優婆夷塞之所受持集以成書壽諸世域引枝尋源資其發軔如高王觀世音經般若波羅蜜多心經等品經呪綜卷錄呈呂帝師牟尼文佛閱定嘉之命以西來妙諦顏其帙嗟乎釋氏之教已久晦矣彼其七心多妄四縛易嬰徒嫌鑿柄之機鋒誰作當頭之棒喝而君獨吹光藜火披礫恒沙思開清淨之門俾入毗盧之界願可云宏矣顧說者謂大藏琅函遺編充棟法門玉律妙旨傳燈悟入無言證成因果菩提明鏡無相胥歸何必晨鐘暮鼓始勗虔修乎抑知文字之益所以闢真緘諷習之勤所以袪慾障茲雖倉分稊米寔足囊括三乘誠解研鑽何殊薪傳衣鉢將使情田自穫性海無塵胸羅卍字皈命金天三年面壁大眾到梅子熟時一笑拈花居士聞木樨香否果識即心是佛奚論無色非空則不徒提暢宗風而信已門開甘露不有大覺入寶山而手仍空如是我聞使頑石之頭能點光緒戊寅歲夏同玄求是子謹序於武林蓼花仙舘退省室後䟦夫高王觀世音經般若多心經大悲陀羅尼神呪準提呪傳世最久信奉持誦者廣而消愆獲福者無窮故靈騐寔跡載諸各經呪本者不知凡幾也然雖有刊布或經本或呪圖未能彚輯固屬易於印送究未成集闕然也予素崇玄學未諳禪修先荷大士甄錄上智傳派復蒙佛恩授記悟靜頒名沐聖德之栽培𮨇涓涘之罔報就於同善錄中所輯禪宗經呪齋期錄出壽世以便崇奉者朝夕捧持不致卷軸紛紜其靈騐事實同善錄中按篇俱在茲不刊列庶昭簡捷並倩同玄樂君石友恭楷付梓板儲西湖昭慶慧空經房印造流通以廣其傳時光緒戊寅歲悟靜周上智敬䟦
