body:
  text: 淨口業真言淨者洗滌而蕩盡之凡人造業不外言行兩端口過尤為易犯必淨滌之方可修真養性也修利修利修者修持之謂利者利己而兼利人也兩句復之重言以申明之也摩訶修利摩訶大也大有所修持而後能利也修修利愈修愈利也薩婆訶薩者見也婆者一切平等也訶者一切法無因寂靜無住清淨不生不滅之義言佛力普照無分貴賤智愚盡致之清淨不生不滅也淨身真言身兼視聽行動言淨身者即非禮勿視非禮勿聽非禮勿動之謂獨舉言行兩端即謹言慎行也修多利修多利修身之道多端必多方修之方能有益也修摩利摩即摩訶也言能修者其利必大與摩訶修利句淺深有別娑婆訶娑者一切法平等婆者無言説義訶者一切法無因寂靜無住清淨不生不滅之義言佛無言説無分貴賤智愚盡致之清淨不生不滅也安土地真言人生履后土而戴皇天后土安皇天亦安矣人當謹言慎行後必求可對天地而無愧故淨身後必安土地南無三滿多沒馱喃天地以一萬二千年為一劫自混沌後空無所有天開於子地闢於丑人生於寅人物漸生而漸滿故云三滿劫交至酉戌亥人物漸稀而漸少故云三減劫是謂沒馱喃沒無也馱載也沒馱喃者言地無所載也佛之修行從三滿劫修至沒馱喃三減劫方成大道石亭和尚云釋迦修行經三滿劫第一阿僧祇滿劫奉事寶相佛至千佛等第二滿劫承事燃燈佛至千佛等第三滿劫供養勝觀佛及千佛等一一無空過者交至莊嚴減劫初閻浮人壽八萬四千歲身長八丈凡過百年命減一歲身減一寸過千年命減十歲身減一尺如是減至十歲身存一尺盡矣於減劫中度生無量前三滿劫即是三增劫凡過百年身增一寸命增一歲至千年身增一尺命增十歲如是增至八萬四千歲身增八丈如是三滿三減為三大阿僧祇劫釋迦方稱萬德圓滿唵唵有二説一指諸鬼神聽一指流注不生滅義此應指不生滅義而言度嚕度嚕嚕者合胎生卵生濕生化生而言言佛之普度一切也地尾薩婆訶尾者地之極邊也自中國蠻貊至日月所照霜露所墜之地皆是也薩婆訶已注上文言佛法普照無分東西南北中夏夷狄盡度之而致清淨不生不滅也上二句合千古言此句指天下言通節總言遍古今合天下佛於其中普度一切也佛説高王觀世音經觀世音經衆矣而言高王觀世音經者以是經為高王國所傳出較西藏諸經尤為可信曰佛説者以是經為觀世音之所親授較他經為倍可珍也觀世音菩薩觀世音者觀世間善惡因由也菩之為言照薩之為言見觀世間善惡因由而照見之也南無佛南無法南無僧南無者歸依也佛家以佛法僧為三寶佛即性之體即儒家天命之謂性南無佛者明心見性法即修行之道即儒家率性之謂道南無法者修持而至於明心見性也僧大衆之謂南無僧者教大衆修持而歸於心見性即儒家修道之謂教也佛國有緣佛法相因相因即歸依也言與佛國有緣者方能歸依佛法常樂我靜有緣佛法常者終身如一日靜常作淨觀下淨光兩字可見所謂主靜立人極也不必專指清淨寂滅説終身能以主靜為樂者方謂有緣佛法南無摩訶般若波羅蜜是大神呪南無摩訶般若波羅蜜是無上呪南無摩訶般若波羅蜜是無等等呪波羅蜜者彼岸也彼岸即佛之明心見性地位般若者言有智慧善破一切煩惱轉為妙用也摩訶者大也波羅蜜者有六或布施或持戒或忍辱或精進或禪定或智慧各占六度之一惟一般若能破一切煩惱則六度兼該萬行俱偹當下即具佛體即儒家所云我欲仁斯仁至矣之謂俚語所云放下屠刀立地成佛是也大神者言其至神速也大明者言其至明亮也無上者言其無可加也無等等者言其莫與匹也自始至此為一段石亭和尚云是大神呪者能驅生死之魔是大明呪者能破長夜癡暗是無上呪者般若是最上發心是法中王所以無上也是無等等呪者般若是六度之第一義無佛與之等齊也南無淨光祕密佛法藏佛淨光者頂上淨字説下即波羅蜜也淨而日光則知當作靜字解祕密對語言解説言歸依佛法者不用語言解説而使性光常靜方是佛藏正法師子吼神足幽王佛師與獅通釋迦初生自行七步一手擎天一手指地張目四顧如師子吼以示上天下地惟我獨尊而神足遍照幽冥也石亭和尚云神足通佛得六通而成道六通者天眼通天耳通他心通宿命通漏盡通神足通即如意通神足通者於一剎那而到四天下也幽王者所處靜寂而不動也佛告須彌燈王佛法護佛金剛經所載如來告須菩提云我於燃燈佛師法無所得蓋佛法必心無所住故告須菩提法無所得正所以護持佛法也金剛藏師子遊戲佛寶勝佛神通佛金剛藏所載有色相有空相所載莊嚴法像變化神妙皆如師子遊戲於世也世人以此謂佛之勝境而寶貴之其實不過佛之神通耳藥師琉璃光佛藥以療病為功師以訓導為能琉璃者借佛國帝青寶石極其明淨者以喻佛身言醫治衆生必先性體極其光明也普光功德山王佛佛居山中而功德普遍十方即儒家光被四表格於上下也善住功德寶王佛作善功德住於一方也過去七佛石亭和尚云一梵語毗婆尸佛華云智光圓滿二梵語尸棄佛華云大智光也即根本智三梵語毗舍浮佛華云遍一切自在四梵語拘留孫佛華云永斷煩惱五梵語拘那含牟尼佛華云能仁寂默以寂默故不住生死以能仁故不住涅槃悲智雙運利物無窮也以上皆指修持已成者焉未來賢劫千佛按三十佛國記所載賢劫千佛名千小兒生於恆水上流國其母生一肉胎擲之恆水為他國王收養後長大甚勇健所往征伐無不摧服次伐其所生本國國王大憂其母夫人登城東高樓語云汝是我子何故作逆倫事始不信後詳言之則放弓伏拜其母而拜其父世儒以佛為無父無君故他佛出處皆不載此獨舉之千五百佛萬五千佛五百化身佛百億金剛藏佛賢劫千佛佛名也而以未來貫下者皆以借喻未來修持者而言定光佛即普光王如來也此獨舉定光者蓋言定而後能靜無論過去未來欲求靜者必先求定耳通卷所稱佛名皆有至理豈泛然雜舉淨光祕密佛至此為一段六方六佛名號此句即下文東南西北上下六句總冒人生於東長於南成於西歸於北魂升於天魄降於地故云六方東方寶光月殿月妙尊音王佛寶光言性體之可寶也月殿月之芽也音影也言人之始生性體之光如月中之影其體甚微而實至尊至妙也南方樹根花王佛言有根者自能發花也西方皂王神通𦦨花王佛世間如一大染場必神通廣大方能世𦦨不染也北方月殿清淨佛人之身後歸至清淨如月之晦也上方無數精進寶首佛首元始也清明之氣上升自能精進不已而保其元善之初也下方善寂月音王佛昏濁之氣下降如月中之影盡歸寂滅也無量諸佛諸佛皆從無量劫修行而成多寶佛言性體之可寶也釋迦牟尼佛釋迦之義云能仁牟尼之義云寂默能仁者即心性無邊含容一切寂默者即性體本寂動靜不干也彌勒佛彌無不也言性體上達無不勒住之而不使下達也阿閦佛閦初也阿合乎人之始初也石亭和尚云阿閦不動常住法性故亦此意彌陀佛無量壽佛也東南西北上下六句言人人皆具佛性下言有修持之功所以成無量壽佛也六方六合名號至此又為一段中央一切衆生在佛世界中者衆生兼人物而言自開闢至今皆有佛持世故云在佛世界中行住於地上及在虗空中慈憂於一切衆生各令安穩休息言由定而靜方能安人安物也晝夜修持心常求誦此經能滅生死苦消伏於毒害伏即金剛經降伏其心之謂毒害即雜妄惡諸念是也佛與言求功名得功名求富貴得富貴求子息得子息而此毒言生死毒害者蓋恐人之入子貪嗔癡耳那摩那摩與南無通大明觀世音觀明觀世音高明觀世音開明觀世音藥王菩薩向稱星宿光長者持藥普施衆生四百四病無不除愈即能滅生死苦也藥上菩薩藥王菩薩之弟即電光長者曰我兄但治身病不醫心病即將兩手擎藥施於衆生貪瞋癡病悉滅菩提智慧即生十惡化為十善六塵化為六度有著化為無住即所謂消伏於毒害也文殊師利菩薩文殊與世文迥異道德足為人師而有利濟者也普賢菩薩德無不遍曰普佑上利下曰賢虗空藏菩薩地藏菩薩指上天下地而言也清涼寶山一萬菩薩寶山即方寸之謂言此心清涼則萬事萬念皆能照見或云清涼寶山地藏王處現在金陵今指心言恐未是不知向稱靈臺方寸靈臺即佛之靈臺也借以喻心清涼寶山何必擬實看普光王如來化勝菩薩如來者如人之本來即儒家復初之謂言不失其初心者其光普照一切雖外緣千變萬化而自能勝之也石亭和尚云如來者無所從來亦無所去故名如來普光者其光普照而無些微逃遁也念念誦此經念念者言無一念夾雜之謂七佛世尊即説呪曰七佛即過去七佛也呪祝也以是法而祝之使從所祈也呪或諸佛密語出於心術妙用冥加之功不可得而思議或鬼神主名呼其主則妖魅竄伏離波離波帝離去世上一切風波也求訶求訶帝訶者一切法無因寂靜無住乃清淨不生不滅之義也陀羅尼帝華云總持摧邪立正殄惡生善皆總而持之尼訶囉帝將邪正善惡一切掃除也毗離尼帝毗尼即六度中之精進不已也摩訶迦帝迦者仁之體摩訶迦帝言仁體之廣大也真靈乾帝真性之靈與天合德即上天之載無聲無臭也娑婆訶娑者無言説義婆者一切法平等訶者一切法無因寂靜無住清淨不生不滅之義言佛無言説致萬古一切悉致清淨不生不滅也高王經原起昔五代時有高歡國王為相州郡主好殺適寶藏官孫敬德誤犯重法囚禁就死忽夢見一僧曰汝持誦觀世音經一千遍當脫刑名敬德曰今在禁中安得經典僧曰吾口授汝睡覺敬書便無忘失虔心誦念得九百遍文案已成王遂令赴市斬之敬德問監使市之遠近監使者曰問之何故敬德曰時夜夢一僧令持觀世音經千遍當得免死今尚欠一百請求緩行隨路急念滿數至市監使宣敕斬之身首不損刀折三段呈王王駭提問汝何幻術令得如此敬德曰實無幻術因在獄中畏死祈禱觀音忽夢一僧教誦觀世音經一千遍獲福如是王謂敬德曰汝勝於我與佛何異王喚典獄者書是經令諸罪人合死者各持誦千遍斬之取驗悉應王乃敕下令民普誦用證福果世遂傳稱高王觀世音經云
